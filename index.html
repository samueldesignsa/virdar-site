    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Virdar",
          "url": "https://virdar.co",
          "logo": "https://virdar.co/favicon.svg",
          "description": "Virdar builds AI-powered automation systems for local businesses.",
          "email": "info@virdar.co",
          "areaServed": {
            "@type": "City",

            "addressRegion": "TX",
            "addressCountry": "US"
          },
          "serviceType": ["AI Automation", "Business Process Automation", "AI Voice Receptionist", "Review Response Automation", "Customer Intelligence Systems"]
        },
        {
          "@type": "LocalBusiness",
          "name": "Virdar",
          "url": "https://virdar.co",
          "email": "info@virdar.co",
          "description": "AI automation agency for local businesses in Dallas, TX. Custom-built systems for missed calls, review responses, customer intelligence, and more.",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Dallas",
            "addressRegion": "TX",
            "addressCountry": "US"
          },
          "priceRange": "$500 - $5,500"
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Do I need to be technical to use any of this?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. We build it, we set it up, we train it on your business. You just watch it run."
              }
            },
            {
              "@type": "Question",
              "name": "How long does it actually take?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Most builds are done and live within 5 business days of you approving the scope."
              }
            },
            {
              "@type": "Question",
              "name": "What if I want to make changes later?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Minor tweaks are covered. If you want a major rebuild, we'll quote a small update fee."
              }
            },
            {
              "@type": "Question",
              "name": "Do I pay upfront?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "50% upfront, 50% when it's live and you're happy with it."
              }
            },
            {
              "@type": "Question",
              "name": "What kinds of businesses do you work with?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Restaurants, dental and medical offices, salons, contractors, retail — any local business with customers. If you're doing something manually that happens more than 10 times a week, we can probably automate it."
              }
            },
            {
              "@type": "Question",
              "name": "What's the most complex thing you've built for a restaurant?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A full guest intelligence system: integrated with their POS, tracking thousands of guests across visit frequency, spend, and behavior. Automated birthday messages, lapsed-guest win-backs, and VIP recognition — all running without any staff involvement."
              }
            },
            {
              "@type": "Question",
              "name": "Do you work with businesses outside of restaurants?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes — dental and medical offices, salons, contractors, retail. The problems are usually the same: missed calls, unanswered reviews, inconsistent follow-up. The systems just get trained differently."
              }
            }
          ]
        }
      ]
    }
    </script>
