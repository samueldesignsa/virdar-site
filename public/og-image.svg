<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F5F5F5" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.04"/>

  <!-- Blue accent glow left -->
  <ellipse cx="150" cy="315" rx="350" ry="220" fill="#4F8EF7" opacity="0.07"/>

  <!-- Blue accent glow right -->
  <ellipse cx="1100" cy="400" rx="200" ry="160" fill="#4F8EF7" opacity="0.05"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#4F8EF7"/>

  <!-- V Logo mark -->
  <g transform="translate(80, 60) scale(3.5)">
    <path d="M2 3L14 25L26 3H20.5L14 17L7.5 3H2Z" fill="#4F8EF7"/>
  </g>

  <!-- Wordmark next to logo -->
  <text x="178" y="108" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#F5F5F5" letter-spacing="-1">virdar</text>

  <!-- Main headline line 1 -->
  <text x="80" y="270" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="68" font-weight="800" fill="#F5F5F5" letter-spacing="-2">We Build Your AI Automation</text>

  <!-- Main headline line 2 — accent colored -->
  <text x="80" y="355" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="68" font-weight="800" fill="#4F8EF7" letter-spacing="-2">Free.</text>
  <text x="230" y="355" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="68" font-weight="800" fill="#F5F5F5" letter-spacing="-2"> You Pay After You See It.</text>

  <!-- Subheadline -->
  <text x="80" y="430" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="26" font-weight="400" fill="#888888">Custom-built for your business. Zero cost until you love it.</text>

  <!-- Divider line -->
  <rect x="80" y="500" width="120" height="3" fill="#4F8EF7" rx="2"/>

  <!-- URL bottom left -->
  <text x="80" y="560" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#F5F5F5" letter-spacing="1">virdar.co</text>

  <!-- CTA pill bottom right -->
  <rect x="870" y="530" width="260" height="56" rx="8" fill="#4F8EF7"/>
  <text x="1000" y="564" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">Book Your Free Call →</text>
</svg>
