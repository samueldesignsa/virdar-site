<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.03"/>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F5F5F5" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Accent glow -->
  <ellipse cx="200" cy="315" rx="300" ry="200" fill="#4F8EF7" opacity="0.06"/>

  <!-- V Logo -->
  <g transform="translate(80, 220) scale(5.5)">
    <path d="M2 3L14 25L26 3H20.5L14 17L7.5 3H2Z" fill="#4F8EF7"/>
  </g>

  <!-- Wordmark -->
  <text x="232" y="310" font-family="Inter, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#F5F5F5" letter-spacing="-2">virdar</text>

  <!-- Divider -->
  <rect x="80" y="348" width="400" height="2" fill="#1E1E1E"/>

  <!-- Tagline -->
  <text x="80" y="400" font-family="Inter, Helvetica, sans-serif" font-size="28" font-weight="400" fill="#888888" letter-spacing="0.5">AI Automation for Local Businesses</text>

  <!-- URL -->
  <text x="80" y="500" font-family="Inter, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#4F8EF7" letter-spacing="1">virdar.co</text>

  <!-- Right side decoration -->
  <rect x="900" y="0" width="1" height="630" fill="#1E1E1E"/>
  <text x="950" y="200" font-family="Inter, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#1E1E1E">AUTOMATE</text>
  <text x="950" y="260" font-family="Inter, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#1E1E1E">GROW</text>
  <text x="950" y="320" font-family="Inter, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#4F8EF7">SCALE</text>
  <text x="950" y="380" font-family="Inter, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#1E1E1E">REPEAT</text>
</svg>
